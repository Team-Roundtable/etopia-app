image: maven:3.9.14-eclipse-temurin-25-alpine

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

stages:
  - validate
  - test
  - build

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository

before_script:
  - mvn -v

# --- Validate (Checkstyle) ---
checkstyle:
  stage: validate
  script:
    - mvn validate

# --- Test ---
test:
  stage: test
  script:
    - mvn test

# --- Build JAR (only on main merges) ---
build:
  stage: build
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
