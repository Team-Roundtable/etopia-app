information.title = E-Topia braucht deine Hilfe!
information.description = Unser Energiebedarf wächst, aber wir müssen nachhaltiger werden. Hilf E-Topia, erneuerbare Technologien zu errichten und die Stadt in eine grüne Zukunft zu führen! Entdecke verschiedene Energiequellen, aktiviere sie in Minigames und verbinde E-Topia am Ende mit einem Smart Grid für eine saubere und stabile Energieversorgung.
information.note = Drück auf den grünen Knopf, um zur Karte zurückzukehren

# -----

information.biogas.start.title = Biogas
information.biogas.start.description = Biogas entsteht, wenn Bakterien organische Abfälle wie Gülle oder Pflanzenreste zersetzen, das dabei entstehende Gas erzeugt Strom und Wärme. Sortiere den nicht-organischen Abfall aus, bevor er die Anlage beschädigt!
information.biogas.start.note = Drück auf den grünen Knopf, um zu starten.

information.biogas.success.title = Biogas
information.biogas.success.description = Biogas ist eine erneuerbare Energiequelle, weil immer wieder neue organische Abfälle nachkommen. Es kann helfen, CO2 zu sparen und Abfälle sinnvoll zu nutzen. Allerdings brauchen Biogasanlagen Platz, Technik und oft auch hohe Kosten.
information.biogas.success.note = Drück auf den grünen Knopf, um zur Karte zurückzukehren

information.biogas.failHealth.title = Biogas
information.biogas.failHealth.description = Es ist dir nicht gelungen, den Abfall richtig zu trennen, sodass die Biogasanlage keinen Strom produzieren konnte. Hilf den Bewohnern von E-Topia und versuche es noch einmal!
information.biogas.failHealth.note = Drück auf den grünen Knopf, um zur Karte zurückzukehren

information.biogas.failTime.title = Biogas
information.biogas.failTime.description = Die Zeit ist abgelaufen!
information.biogas.failTime.note = Drück auf den grünen Knopf, um zur Karte zurückzukehren

# -----

information.wind.start.title = Windkraft
information.wind.start.description = Windkraftwerke verwandeln Wind in Strom: Rotorblätter drehen einen Generator und erzeugen Energie. Bewege das Windrad hoch und runter, um möglichst viel Wind einzufangen, aber Vorsicht vor zu starken Böen!
information.wind.start.note = Drück auf den grünen Knopf, um zu starten.

information.wind.success.title = Windkraft
information.wind.success.description = Windenergie ist umweltfreundlich, weil dabei kein CO2 entsteht. Sie gehört zu den erneuerbaren Energien, die sich nicht verbrauchen. Allerdings braucht man viel Platz und ausreichend Wind, damit sie gut funktioniert.
information.wind.success.note = Drück auf den grünen Knopf, um zur Karte zurückzukehren

information.wind.failHealth.title = Windkraft
information.wind.failHealth.description = Windrad beschädigt! Die Turbine wurde durch zu starken Wind beschädigt, sodass keine Windenergie produziert werden kann. Versuch es nochmal!
information.wind.failHealth.note =  Drück auf den grünen Knopf, um zur Karte zurückzukehren

information.wind.failTime.title = Windkraft
information.wind.failTime.description = Zeit abgelaufen! Leider hast du es nicht geschafft, genug Wind einzufangen, um E-Topia mit Windenergie zu versorgen. Versuch es nochmal
information.wind.failTime.note = Drück auf den grünen Knopf, um zur Karte zurückzukehren

# -----

information.geothermal.start.title = Geothermie
information.geothermal.start.description = Geothermie nutzt die Wärme aus dem Erdinneren: Tiefe Bohrlöcher leiten Wasser hinab, das erhitzt als Dampf Turbinen antreibt. Bohre dich bis zum Erdkern und verlege die Rohre, pass auf die Steine auf!
information.geothermal.start.note = Drück auf den grünen Knopf, um zu starten.

information.geothermal.success.title = Geothermie
information.geothermal.success.description = Geothermie ist eine erneuerbare Energiequelle und fast immer verfügbar, egal ob es Tag oder Nacht ist. Sie verursacht wenig CO2 und ist deshalb gut für die Umwelt. Allerdings ist der Bau der Anlagen oft teuer und aufwendig.
information.geothermal.success.note = Drück auf den grünen Knopf, um zur Karte zurückzukehren

information.geothermal.failHealth.title = Geothermie
information.geothermal.failHealth.description = Der Bohrer wurde beschädigt! Leider konnten keine Rohre verlegt werden, um Strom zu erzeugen. Versuche es gleich noch einmal!
information.geothermal.failHealth.note = Drück auf den grünen Knopf, um zur Karte zurückzukehren

information.geothermal.failTime.title = Geothermie
information.geothermal.failTime.description = Die Zeit ist abgelaufen!
information.geothermal.failTime.note = Drück auf den grünen Knopf, um zur Karte zurückzukehren

# -----

information.solar.start.title = Solar
information.solar.start.description = Solarmodule fangen Sonnenlicht ein und wandeln es direkt in Strom um. Richte das Panel optimal zur Sonne aus, um maximale Energie für E-Topia zu erzeugen!
information.solar.start.note = Drück auf den grünen Knopf, um zu starten.

information.solar.success.title = Solar
information.solar.success.description = Solarenergie ist kostenlos und CO2-frei, solange die Sonne scheint. Bei Bewölkung oder nachts liefert sie kaum Strom, und die Anlage ist teuer in der Anschaffung.
information.solar.success.note = Drück auf den grünen Knopf, um zur Karte zurückzukehren

information.solar.failTime.title = Solar
information.solar.failTime.description = Die Zeit ist abgelaufen! Leider hast du es dieses Mal nicht geschafft, genug Sonnenlicht einzufangen, um Strom für E-Topia zu erzeugen. Versuch es noch mal!
information.solar.failTime.note = Drück auf den grünen Knopf, um zur Karte zurückzukehren

# -----

information.grid.start.title = Smart Grid
information.grid.start.description = Ein Smart Grid verbindet erneuerbare Energiequellen und verteilt Strom genau dorthin, wo er gebraucht wird, ohne Verschwendung. Verbinde alle Technologien mit dem Netz und achte auf die richtige Ausrichtung der Verbindungsteile!
information.grid.start.note = Drück auf den grünen Knopf, um zu starten.

information.grid.success.title = Smart Grid
information.grid.success.description = Du hast es geschafft! Du hast uns erfolgreich von der fossilen Energie losgelöst und mit dem Smart Grid verbunden. Dank dir konnten wir die Energiewende bewältigen und haben nun eine stabile Energieversorgung.
information.grid.success.note = Drück auf den grünen Knopf, um zur Karte zurückzukehren

information.grid.failTime.title = Smart Grid
information.grid.failTime.description = Die Zeit ist abgelaufen! Leider hast du es nicht rechtzeitig geschafft, alle Technologien zu verbinden. Versuche es gleich noch einmal, damit E-Topia wieder Strom hat.
information.grid.failTime.note = Drück auf den grünen Knopf, um zur Karte zurückzukehren
