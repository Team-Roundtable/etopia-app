settings.exit = Close

# -----

information.title = E-Topia Needs Your Help!
information.description = Our energy demand is growing, but we need to become more sustainable. Help E-Topia build renewable technologies and lead the city into a green future! Discover different energy sources, activate them through minigames, and finally connect E-Topia to a smart grid for a clean and stable energy supply.
information.note = Press the green button to return to the map

# -----

information.biogas.start.title = Biogas
information.biogas.start.description = Biogas is produced when bacteria break down organic waste such as manure or plant residues. The resulting gas is used to generate electricity and heat. Sort out the non-organic waste before it damages the plant!
information.biogas.start.note = Press the green button to start.

information.biogas.success.title = Biogas
information.biogas.success.description = Biogas is a renewable energy source because new organic waste is continuously produced. It can help reduce CO2 emissions and make useful use of waste. However, biogas plants require space, technology, and often significant investment costs.
information.biogas.success.note = Press the green button to return to the map

information.biogas.failHealth.title = Biogas
information.biogas.failHealth.description = You were unable to sort the waste correctly, so the biogas plant could not generate electricity. Help the residents of E-Topia and try again!
information.biogas.failHealth.note = Press the green button to return to the map

information.biogas.failTime.title = Biogas
information.biogas.failTime.description = Time is up!
information.biogas.failTime.note = Press the green button to return to the map

# -----

information.wind.start.title = Wind Power
information.wind.start.description = Wind turbines convert wind into electricity: rotating blades drive a generator to produce energy. Move the turbine up and down to capture as much wind as possible, but watch out for strong gusts!
information.wind.start.note = Press the green button to start.

information.wind.success.title = Wind Power
information.wind.success.description = Wind energy is environmentally friendly because it produces no CO2 emissions. It is a renewable energy source that does not run out. However, it requires a lot of space and sufficient wind conditions to operate effectively.
information.wind.success.note = Press the green button to return to the map

information.wind.failHealth.title = Wind Power
information.wind.failHealth.description = Turbine damaged! The turbine was damaged by excessive wind, making it unable to generate electricity. Try again!
information.wind.failHealth.note = Press the green button to return to the map

information.wind.failTime.title = Wind Power
information.wind.failTime.description = Time is up! Unfortunately, you did not manage to capture enough wind to supply E-Topia with wind energy. Try again!
information.wind.failTime.note = Press the green button to return to the map

# -----

information.geothermal.start.title = Geothermal Energy
information.geothermal.start.description = Geothermal energy uses heat from within the Earth. Deep boreholes carry water underground, where it is heated and returns as steam to drive turbines. Drill your way to the Earth's core and lay the pipes, but watch out for rocks!
information.geothermal.start.note = Press the green button to start.

information.geothermal.success.title = Geothermal Energy
information.geothermal.success.description = Geothermal energy is a renewable energy source and is available almost all the time, whether it is day or night. It produces very little CO2 and is therefore environmentally friendly. However, building geothermal facilities is often expensive and complex.
information.geothermal.success.note = Press the green button to return to the map

information.geothermal.failHealth.title = Geothermal Energy
information.geothermal.failHealth.description = The drill was damaged! Unfortunately, no pipes could be installed to generate electricity. Try again!
information.geothermal.failHealth.note = Press the green button to return to the map

information.geothermal.failTime.title = Geothermal Energy
information.geothermal.failTime.description = Time is up!
information.geothermal.failTime.note = Press the green button to return to the map

# -----

information.solar.start.title = Solar Power
information.solar.start.description = Solar panels capture sunlight and convert it directly into electricity. Align the panel optimally with the sun to generate maximum energy for E-Topia!
information.solar.start.note = Press the green button to start.

information.solar.success.title = Solar Power
information.solar.success.description = Solar energy is free and CO2-free as long as the sun is shining. During cloudy weather or at night, it generates little to no electricity, and the installation costs can be high.
information.solar.success.note = Press the green button to return to the map

information.solar.failTime.title = Solar Power
information.solar.failTime.description = Time is up! Unfortunately, you did not manage to capture enough sunlight to generate electricity for E-Topia this time. Try again!
information.solar.failTime.note = Press the green button to return to the map

# -----

information.grid.start.title = Smart Grid
information.grid.start.description = A smart grid connects renewable energy sources and distributes electricity exactly where it is needed without waste. Connect all technologies to the grid and make sure the connection pieces are correctly aligned!
information.grid.start.note = Press the green button to start.

information.grid.success.title = Smart Grid
information.grid.success.description = You did it! You successfully freed us from fossil energy and connected us to the smart grid. Thanks to you, we achieved the energy transition and now have a stable energy supply.
information.grid.success.note = Press the green button to return to the map

information.grid.failTime.title = Smart Grid
information.grid.failTime.description = Time is up! Unfortunately, you did not manage to connect all technologies in time. Try again so that E-Topia can have electricity once more.
information.grid.failTime.note = Press the green button to return to the map
