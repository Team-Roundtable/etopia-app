settings.title = Settings
settings.exit = Exit

information.title = E-Topia
information.description = You are responsible for transforming this island into a sustainable energy system. Master different renewable technologies and keep the grid running.
information.note = Press space to return to map

biogas.information.start.title = Biogas
biogas.information.start.description = Sort waste on the conveyor belt and collect only biodegradable materials like food scraps or plants. Biogas plants turn this organic matter into methane through microbial decomposition, producing usable energy. Avoid non biodegradable items, as they disrupt the process and damage the system. Fill your energy bar by collecting the right materials.
biogas.information.start.note = Press space to start
biogas.information.success.title = Success
biogas.information.success.description = You efficiently separated organic waste and produced enough biogas. This renewable source helps reduce landfill waste and generates clean energy. Your system is now running at full capacity.
biogas.information.success.note = Press space to return to map
biogas.information.failHealth.title = Fail health
biogas.information.failHealth.description = Too many incorrect materials entered the system, disrupting the biogas production process. Non biodegradable waste can block or damage real facilities. The system has shut down due to contamination.
biogas.information.failHealth.note = Press space to return to map

wind.information.start.title = Wind
wind.information.start.description = Control the turbine height to capture strong, steady winds while avoiding dangerous turbulence. Wind turbines convert kinetic energy from air movement into electricity using rotating blades. Stay in optimal wind zones and avoid storms or tornadoes that can damage the turbine. Collect enough energy to fill the bar.
wind.information.start.note = Press space to start
wind.information.success.title = Success
wind.information.success.description = You captured consistent wind and generated enough electricity. Wind power is a clean and scalable renewable energy source. The turbine operated efficiently under your control.
wind.information.success.note = Press space to return to map
wind.information.failHealth.title = Fail health
wind.information.failHealth.description = The turbine was hit by too many turbulent winds or tornadoes. In reality, extreme weather can damage blades and reduce efficiency. The system failed due to excessive stress.
wind.information.failHealth.note = Press space to return to map
wind.information.failTime.title = Fail clock
wind.information.failTime.description = You ran out of time before generating enough energy. Efficient positioning is key to capturing wind power. The turbine did not meet the required output.
wind.information.failTime.note = Press space to return to map

geothermal.information.start.title = Geothermal
geothermal.information.start.description = Guide the drill deep underground and return safely while laying a continuous pipe. Geothermal systems use heat from the Earth to produce energy, requiring stable and intact piping. Avoid rocks and do not cross your own path, as this would break the system. Complete the loop to activate energy production.
geothermal.information.start.note = Press space to start
geothermal.information.success.title = Success
geothermal.information.success.description = You successfully installed a geothermal loop. Heat from deep underground can now be used to generate reliable and constant energy. The system is stable and operational.
geothermal.information.success.note = Press space to return to map
geothermal.information.failHealth.title = Fail health
geothermal.information.failHealth.description = The drill collided with obstacles or damaged its own pipeline. In real systems, structural failures can stop energy extraction entirely. The installation process failed.
geothermal.information.failHealth.note = Press space to return to map

solar.information.start.title = Solar
solar.information.start.description = Adjust the solar panel angle to follow the sun throughout the day. Solar panels convert sunlight into electricity using photovoltaic cells. Optimal alignment increases efficiency, while poor angles reduce output. Track the sun carefully to maximise energy production.
solar.information.start.note = Press space to start
solar.information.success.title = Success
solar.information.success.description = You maintained optimal alignment and generated enough solar energy. Solar power is clean and widely used, especially in sunny regions. Your panel performed at high efficiency.
solar.information.success.note = Press space to return to map
solar.information.failTime.title = Fail health
solar.information.failTime.description = Time ran out before enough energy was collected. Missing the optimal angles reduces the effectiveness of solar panels. The system did not reach the required output.
solar.information.failTime.note = Press space to return to map

grid.information.start.title = Power Grid
grid.information.start.description = Connect all energy sources to supply the city with electricity. A stable grid distributes power from multiple producers to consumers efficiently. Rotate and align cables correctly to complete the network. Ensure all connections are active before time runs out.
grid.information.start.note = Press space to start
grid.information.success.title = Success
grid.information.success.description = You successfully connected the grid and powered the city. A well managed grid balances supply and demand across all sources. The island now runs on renewable energy.
grid.information.success.note = Press space to return to map
grid.information.failTime.title = Fail health
grid.information.failTime.description = You ran out of time before completing the grid. Missing or incorrect connections prevent electricity from reaching consumers. The city remains without power.
grid.information.failTime.note = Press space to return to map
