information.title = E-Topia
information.description = Du bist dafür verantwortlich, diese Insel auf erneuerbare Energie umzustellen. Beherrsche verschiedene Technologien und halte das Stromnetz stabil und effizient am Laufen.
information.note = Leertaste drücken, um zur Karte zurückzukehren

biogas.information.start.title = Biogasanlage starten
biogas.information.start.description = Sortiere den Abfall auf dem Förderband und sammle nur biologisch abbaubare Materialien wie Essensreste oder Pflanzen. In Biogasanlagen wird daraus durch Mikroorganismen Methan gewonnen, das zur Energieerzeugung genutzt wird. Vermeide nicht abbaubare Stoffe, da sie den Prozess stören. Fülle deine Energieanzeige durch korrektes Sammeln.
biogas.information.start.note = Leertaste drücken, um zu starten
biogas.information.success.title = Biogas erfolgreich erzeugt
biogas.information.success.description = Du hast organischen Abfall korrekt getrennt und genügend Biogas produziert. Diese Technologie reduziert Abfall und liefert gleichzeitig erneuerbare Energie. Die Anlage läuft nun effizient.
biogas.information.success.note = Leertaste drücken, um zur Karte zurückzukehren
biogas.information.failHealth.title = Anlage beschädigt
biogas.information.failHealth.description = Zu viele falsche Materialien sind in die Anlage gelangt. Nicht abbaubare Stoffe können echte Anlagen blockieren oder beschädigen. Der Prozess wurde gestoppt.
biogas.information.failHealth.note = Leertaste drücken, um zur Karte zurückzukehren

wind.information.start.title = Windkraft steuern
wind.information.start.description = Bewege die Turbine in die richtige Höhe, um starken und gleichmässigen Wind zu nutzen. Windkraftanlagen wandeln die Bewegungsenergie der Luft in Strom um. Vermeide Turbulenzen und Tornados, da sie Schäden verursachen können. Sammle genügend Energie durch geschickte Positionierung.
wind.information.start.note = Leertaste drücken, um zu starten
wind.information.success.title = Windenergie gewonnen
wind.information.success.description = Du hast konstanten Wind genutzt und ausreichend Energie erzeugt. Windkraft ist eine saubere und skalierbare Energiequelle. Die Turbine lief unter deiner Kontrolle optimal.
wind.information.success.note = Leertaste drücken, um zur Karte zurückzukehren
wind.information.failHealth.title = Turbine beschädigt
wind.information.failHealth.description = Die Turbine wurde zu oft von starken Turbulenzen oder Tornados getroffen. Extreme Wetterbedingungen können reale Anlagen beschädigen. Der Betrieb musste eingestellt werden.
wind.information.failHealth.note = Leertaste drücken, um zur Karte zurückzukehren
wind.information.failClock.title = Zeit abgelaufen
wind.information.failClock.description = Die Zeit reichte nicht aus, um genügend Energie zu sammeln. Eine effiziente Positionierung ist entscheidend für gute Erträge. Das Ziel wurde nicht erreicht.
wind.information.failClock.note = Leertaste drücken, um zur Karte zurückzukehren

geothermal.information.start.title = Geothermiebohrung
geothermal.information.start.description = Steuere die Bohrung tief in die Erde und kehre sicher zurück, während du ein Rohrsystem verlegst. Geothermie nutzt die Hitze aus dem Erdinneren zur Energiegewinnung. Vermeide Hindernisse und kreuze deinen eigenen Weg nicht. Nur ein intaktes System liefert Energie.
geothermal.information.start.note = Leertaste drücken, um zu starten
geothermal.information.success.title = Geothermie aktiv
geothermal.information.success.description = Du hast erfolgreich ein geschlossenes Rohrsystem installiert. Die Erdwärme kann nun konstant zur Energieerzeugung genutzt werden. Die Anlage arbeitet stabil.
geothermal.information.success.note = Leertaste drücken, um zur Karte zurückzukehren
geothermal.information.failHealth.title = Bohrung fehlgeschlagen
geothermal.information.failHealth.description = Die Bohrung ist auf Hindernisse gestossen oder das Rohrsystem wurde beschädigt. Solche Fehler verhindern die Energiegewinnung vollständig. Die Installation ist gescheitert.
geothermal.information.failHealth.note = Leertaste drücken, um zur Karte zurückzukehren

solar.information.start.title = Solaranlage ausrichten
solar.information.start.description = Richte das Solarpanel optimal zur Sonne aus und folge ihrem Verlauf. Solarmodule wandeln Sonnenlicht mithilfe von Photovoltaik in Strom um. Der Winkel bestimmt die Effizienz der Energiegewinnung. Halte die Ausrichtung möglichst genau.
solar.information.start.note = Leertaste drücken, um zu starten
solar.information.success.title = Solarenergie gewonnen
solar.information.success.description = Du hast das Panel optimal ausgerichtet und genügend Energie gesammelt. Solarenergie ist eine der wichtigsten erneuerbaren Quellen weltweit. Deine Anlage arbeitet effizient.
solar.information.success.note = Leertaste drücken, um zur Karte zurückzukehren
solar.information.failClock.title = Zeit abgelaufen
solar.information.failClock.description = Die Zeit hat nicht gereicht, um genügend Energie zu sammeln. Eine schlechte Ausrichtung reduziert die Leistung deutlich. Das Ziel wurde verfehlt.
solar.information.failClock.note = Leertaste drücken, um zur Karte zurückzukehren

grid.information.start.title = Stromnetz verbinden
grid.information.start.description = Verbinde alle Energiequellen mit der Stadt, um eine stabile Versorgung sicherzustellen. Ein Stromnetz verteilt Energie von Produzenten zu Verbrauchern. Drehe und verbinde die Leitungen korrekt, damit der Strom fliessen kann. Schliesse alle Verbindungen rechtzeitig ab.
grid.information.start.note = Leertaste drücken, um zu starten
grid.information.success.title = Netz erfolgreich verbunden
grid.information.success.description = Du hast das Stromnetz erfolgreich aufgebaut und die Stadt versorgt. Ein gut funktionierendes Netz gleicht Angebot und Nachfrage aus. Die Insel wird nun zuverlässig versorgt.
grid.information.success.note = Leertaste drücken, um zur Karte zurückzukehren
grid.information.failClock.title = Zeit abgelaufen
grid.information.failClock.description = Die Zeit ist abgelaufen, bevor das Netz fertiggestellt wurde. Fehlende Verbindungen verhindern die Stromversorgung. Die Stadt bleibt ohne Energie.
grid.information.failClock.note = Leertaste drücken, um zur Karte zurückzukehren
